<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Phantaway</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #status {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: #88bbff; font-size: 14px; background: rgba(0,0,0,0.7);
      padding: 8px 16px; border-radius: 6px; z-index: 100; font-family: sans-serif;
    }
    #vr-button {
      position: absolute; bottom: 20px; right: 20px;
      padding: 12px 24px; background: #88bbff; color: #000;
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="status">Initializing…</div>
  <button id="vr-button">Enter VR (Hand Tracking)</button>

    <script type="module">
      try {
        const THREE = await import('https://unpkg.com/three@0.160.0/build/three.module.js');
        // --- scene setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202020);
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 100);
        camera.position.set(0, 1.6, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.xr.enabled = true;
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemi);

     const skinMat = new THREE.MeshStandardMaterial({ color: 0xffd2b8, roughness: 0.6, metalness: 0.1 });
     const shirtMat = new THREE.MeshStandardMaterial({ color: 0x3399ff, roughness: 0.5, metalness: 0.1 });
     const pantsMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6, metalness: 0.1 });
     const robotMat = new THREE.MeshStandardMaterial({ color: 0x3399ff, roughness: 0.4, metalness: 0.2 });
     const jointMat = new THREE.MeshStandardMaterial({ color: 0xffa500, roughness: 0.4, metalness: 0.2 });

     // Arm segment lengths (shared)
     const L1 = 0.35; // upper arm (shoulder→elbow)
     const L2 = 0.30; // forearm (elbow→wrist)

    // ============================================================
    // AVATAR BODY
    // ============================================================
    const avatar = new THREE.Group();
    scene.add(avatar);

    // Torso
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.18, 0.55, 12), shirtMat);
    torso.position.y = 0.9;
    avatar.add(torso);

    // Camera (XR camera set by device)
    // camera position controlled by XR pose

    // ============================================================
    // LIMBS – joints as Groups with distinct joint spheres
    // ============================================================

    // --- LEFT ARM (simple human) ---
    const leftShoulder = new THREE.Group();  // pitch X, yaw Y
    const leftElbow = new THREE.Group();     // pitch X
    const leftWrist = new THREE.Group();     // yaw Y
    torso.add(leftShoulder);
    leftShoulder.add(leftElbow);
    leftElbow.add(leftWrist);

    // shoulder offset from torso center
    leftShoulder.position.set(0.22, 0, 0);
    leftShoulder.rotation.order = 'YXZ'; // yaw first, then pitch

    // DISTINCT JOINTS – sphere at exact joint center
    const leftJointS = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), jointMat);
    leftShoulder.add(leftJointS);

    // upper arm link (vertical cylinder)
    const leftUpper = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.035, L1, 12), skinMat);
    leftUpper.position.y = -L1/2;
    leftShoulder.add(leftUpper);

    // elbow joint sphere
    leftElbow.position.y = -L1;
    const leftJointE = new THREE.Mesh(new THREE.SphereGeometry(0.04, 12, 12), jointMat);
    leftElbow.add(leftJointE);

    // forearm link
    const leftFore = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.03, L2, 12), skinMat);
    leftFore.position.y = -L2/2;
    leftElbow.add(leftFore);

    // wrist joint sphere
    leftWrist.position.y = -L2;
    const leftJointW = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 12), jointMat);
    leftWrist.add(leftJointW);

    // hand
    const leftHand = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.08, 0.03), skinMat);
    leftHand.position.y = -0.10;
    leftWrist.add(leftHand);

    // --- RIGHT ARM (robotic) ---
    const rShoulder = new THREE.Group();
    const rElbow = new THREE.Group();
    const rWrist = new THREE.Group();
    torso.add(rShoulder);
    rShoulder.add(rElbow);
    rElbow.add(rWrist);

    rShoulder.position.set(-0.22, 0, 0);
    rShoulder.rotation.order = 'YXZ';

    // joint spheres
    const rJointS = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), jointMat);
    rShoulder.add(rJointS);

    // upper arm
    const rUpper = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.035, L1, 12), robotMat);
    rUpper.position.y = -L1/2;
    rShoulder.add(rUpper);

    // elbow
    rElbow.position.y = -L1;
    const rJointE = new THREE.Mesh(new THREE.SphereGeometry(0.04, 12, 12), jointMat);
    rElbow.add(rJointE);

    // forearm
    const rFore = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.03, L2, 12), robotMat);
    rFore.position.y = -L2/2;
    rElbow.add(rFore);

    // wrist
    rWrist.position.y = -L2;
    const rJointW = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 12), jointMat);
    rWrist.add(rJointW);

    // gripper
    const rGripper = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.12, 0.04), robotMat);
    rGripper.position.y = -0.10;
    rWrist.add(rGripper);

    // --- LEGS (seated: hips/knees at 90°) ---
    const leftHip = new THREE.Group();   // pitch X
    const leftKnee = new THREE.Group();
    torso.add(leftHip);
    leftHip.add(leftKnee);

    leftHip.position.set(0.1, -0.05, 0); // hip joint slightly below torso
    leftHip.add(new THREE.Mesh(new THREE.SphereGeometry(0.055, 12, 12), jointMat));
    const leftThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.055, 0.45, 12), pantsMat);
    leftThigh.position.y = -0.225;
    leftHip.add(leftThigh);
    leftKnee.position.y = -0.45;
    leftKnee.add(new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), jointMat));
    const leftShin = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.045, 0.45, 12), pantsMat);
    leftShin.position.y = -0.225;
    leftKnee.add(leftShin);
    const leftFoot = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 0.14), skinMat);
    leftFoot.position.set(0, -0.225, 0.05);
    leftKnee.add(leftFoot);

    const rightHip = new THREE.Group();
    const rightKnee = new THREE.Group();
    torso.add(rightHip);
    rightHip.add(rightKnee);

    rightHip.position.set(-0.1, -0.05, 0);
    rightHip.add(new THREE.Mesh(new THREE.SphereGeometry(0.055, 12, 12), jointMat));
    const rightThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.055, 0.45, 12), pantsMat);
    rightThigh.position.y = -0.225;
    rightHip.add(rightThigh);
    rightKnee.position.y = -0.45;
    rightKnee.add(new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), jointMat));
    const rightShin = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.045, 0.45, 12), pantsMat);
    rightShin.position.y = -0.225;
    rightKnee.add(rightShin);
    const rightFoot = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 0.14), skinMat);
    rightFoot.position.set(0, -0.225, 0.05);
    rightKnee.add(rightFoot);

    // Seated pose: hips and knees at 90°
    leftHip.rotation.x = Math.PI/2;
    leftKnee.rotation.x = Math.PI/2;
    rightHip.rotation.x = Math.PI/2;
    rightKnee.rotation.x = Math.PI/2;

    // Ground grid
    const grid = new THREE.GridHelper(10, 10, 0x444444, 0x333333);
    grid.position.y = 0.01;
    scene.add(grid);

    // ============================================================
    // VR INPUT
    // ============================================================
    const ctrlL = renderer.xr.getController(1);
    const ctrlR = renderer.xr.getController(0);
    if (ctrlL) {
      scene.add(ctrlL);
      const vis = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.1,6), new THREE.MeshStandardMaterial({color:0x88bbff}));
      vis.rotation.x = Math.PI/2;
      ctrlL.add(vis);
    }
    if (ctrlR) {
      scene.add(ctrlR);
      const vis = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.1,6), new THREE.MeshStandardMaterial({color:0x88bbff}));
      vis.rotation.x = Math.PI/2;
      ctrlR.add(vis);
    }

    let vrActive = false;
    let trackedHandL = null;

    const statusEl = document.getElementById('status');

    // ============================================================
    // ARM IK SOLVER (3-DOF: shoulder yaw, shoulder pitch, elbow pitch)
    // ============================================================
    function solveArmIK(shoulderGrp, elbowGrp, wristGrp, targetWorld) {
      const shoulderWorld = new THREE.Vector3();
      shoulderGrp.getWorldPosition(shoulderWorld);

      const dx = targetWorld.x - shoulderWorld.x;
      const dy = targetWorld.y - shoulderWorld.y;
      const dz = targetWorld.z - shoulderWorld.z;

      const horiz = Math.sqrt(dx*dx + dz*dz);
      const down = -dy; // positive = below shoulder

      // Shoulder yaw (rotate around world Y to face target horizontally)
      const yaw = Math.atan2(dx, -dz);
      shoulderGrp.rotation.y = yaw;

       // Link lengths (use closure-captured L1, L2)
       // Clamp reach
      let d = Math.sqrt(horiz*horiz + down*down);
      const maxReach = L1 + L2;
      if (d > maxReach) {
        const s = maxReach / d;
        horiz *= s; down *= s; d = maxReach;
      }

      // Elbow flexion (0 = straight)
      const cosGamma = (L1*L1 + L2*L2 - d*d) / (2 * L1 * L2);
      const gamma = Math.acos(Math.max(-1, Math.min(1, cosGamma)));
      const elbowFlex = Math.PI - gamma;

      // Shoulder pitch from down direction
      const psi = Math.atan2(horiz, down);
      const phi = Math.atan2(L2 * Math.sin(elbowFlex), L1 + L2 * Math.cos(elbowFlex));
      const shoulderPitch = psi - phi;

      shoulderGrp.rotation.x = shoulderPitch;
      elbowGrp.rotation.x = elbowFlex;
      wristGrp.rotation.x = 0; // keep straight
    }

    // Mirror left hand world pose → right arm
    function mirrorLeftToRightArm(lpos, lquat) {
      const mPos = new THREE.Vector3(-lpos.x, lpos.y, lpos.z);
      const mQuat = lquat.clone();
      const flip = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI);
      mQuat.premultiply(flip);
      // offset: hand extends down from wrist by 0.10, so wrist = hand - (0, -0.10,0)? Actually hand is below wrist, so to have hand tip at mirroredPos, wrist should be above by hand length.
      // In our model, hand extends along -Y from wrist. So wristWorld = handWorld + (0, 0.10, 0) in world if no wrist rotation. But wrist may rotate. We'll approx:
      const offset = new THREE.Vector3(0, 0.10, 0); // move up by hand length
      offset.applyQuaternion(mQuat); // apply mirrored orientation (though yaw only)
      const wristTarget = mPos.clone().add(offset);
      solveArmIK(rShoulder, rElbow, rWrist, wristTarget);
      // wrist yaw from mirrored quaternion
      const euler = new THREE.Euler().setFromQuaternion(mQuat, 'YXZ');
      const baseYaw = rShoulder.rotation.y;
      rWrist.rotation.y = euler.y - baseYaw;
    }

    // Update left arm directly from hand/controller
    function updateLeftArmFromSource(pos, quat) {
      // target for wrist: we approximate wrist = hand pos + (0, 0.10, 0)
      const offset = new THREE.Vector3(0, 0.10, 0);
      offset.applyQuaternion(quat);
      const wristTarget = pos.clone().add(offset);
      solveArmIK(leftShoulder, leftElbow, leftWrist, wristTarget);
      const euler = new THREE.Euler().setFromQuaternion(quat, 'YXZ');
      const baseYaw = leftShoulder.rotation.y;
      leftWrist.rotation.y = euler.y - baseYaw;
    }

    // ============================================================
    // VR SESSION
    // ============================================================
    function sessionStart(session) {
      vrActive = true;
      statusEl.textContent = 'VR: Show left hand';
      session.addEventListener('inputsourceschange', onInputChange);
      onInputChange();
    }

    function onInputChange() {
      const session = renderer.xr.getSession();
      if (!session) return;
      trackedHandL = null;
      for (const src of session.inputSources) {
        if (src.hand && src.handedness === 'left') {
          trackedHandL = src.hand;
          statusEl.textContent = 'Hand tracking: LEFT → right arm';
          break;
        }
      }
      if (!trackedHandL) statusEl.textContent = 'Controller: use LEFT controller';
    }

    function sessionEnd() {
      vrActive = false;
      trackedHandL = null;
      statusEl.textContent = 'Session ended';
    }

    renderer.xr.addEventListener('sessionstart', (e) => sessionStart(e.session));
    renderer.xr.addEventListener('sessionend', sessionEnd);

    // ============================================================
    // VR BUTTON
    // ============================================================
    const vrBtn = document.getElementById('vr-button');
    vrBtn.addEventListener('click', async () => {
      const opts = { optionalFeatures: ['hand-tracking', 'local-floor'] };
      try {
        const sess = await navigator.xr.requestSession('immersive-vr', opts);
        await renderer.xr.setSession(sess);
        vrBtn.textContent = 'Exit VR';
        vrBtn.onclick = () => sess.end();
      } catch (e) {
        console.error(e);
        alert('WebXR or hand-tracking not available on this device/browser.');
      }
    });

    // ============================================================
    // RENDER LOOP
    // ============================================================
    let refSpace = null;

    renderer.setAnimationLoop((time, frame) => {
      if (vrActive && frame) {
        if (!refSpace) {
          refSpace = renderer.xr.getReferenceSpace();
          if (!refSpace) return;
        }

        // --- Left arm direct driving ---
        if (trackedHandL && trackedHandL.get('wrist')) {
          const wristJoint = trackedHandL.get('wrist');
          const pose = wristJoint.getPose(refSpace);
          if (pose) {
            const pos = new THREE.Vector3().fromArray(pose.transform.position);
            const quat = new THREE.Quaternion().fromArray(pose.transform.orientation);
            updateLeftArmFromSource(pos, quat);
          }
        } else if (ctrlL && ctrlL.visible) {
          const lpos = new THREE.Vector3();
          ctrlL.getWorldPosition(lpos);
          const lquat = new THREE.Quaternion();
          ctrlL.getWorldQuaternion(lquat);
          updateLeftArmFromSource(lpos, lquat);
        }

        // --- Mirror to right arm ---
        if (trackedHandL && trackedHandL.get('wrist')) {
          const wristJoint = trackedHandL.get('wrist');
          const pose = wristJoint.getPose(refSpace);
          if (pose) {
            const pos = new THREE.Vector3().fromArray(pose.transform.position);
            const quat = new THREE.Quaternion().fromArray(pose.transform.orientation);
            mirrorLeftToRightArm(pos, quat);
          }
        } else if (ctrlL && ctrlL.visible) {
          const lpos = new THREE.Vector3();
          ctrlL.getWorldPosition(lpos);
          const lquat = new THREE.Quaternion();
          ctrlL.getWorldQuaternion(lquat);
          mirrorLeftToRightArm(lpos, lquat);
        }

        // --- Legs stay in seated pose ---
        // Already set by rotations; nothing to update

        // --- Avatar follows headset position ---
        const xrCam = renderer.xr.getCamera();
        const camPos = new THREE.Vector3();
        xrCam.getWorldPosition(camPos);
        avatar.position.x = camPos.x;
        avatar.position.z = camPos.z;
        avatar.position.y = 0; // feet at world Y=0
        }

        renderer.render(scene, camera);
      });
    } catch (e) {
      console.error(e);
      const el = document.getElementById('status');
      if (el) el.textContent = 'FATAL: ' + e.message;
    }
  </script>
</body>
</html>
