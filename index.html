<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quest WebXR – Phantom Limb Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  100
);
camera.position.set(0, 1.6, 1.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.xr.enabled = true;
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
scene.add(light);

// -----------------------------------------------------
// PLACEHOLDER LIMB (upper arm + forearm + hand)
// -----------------------------------------------------
const limbGroup = new THREE.Group();

// Upper arm
const upperArm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.05, 0.05, 0.35, 16),
  new THREE.MeshStandardMaterial({ color: 0x00ffcc })
);
upperArm.position.set(0, 1.6, -1);
upperArm.rotation.z = Math.PI / 8;
limbGroup.add(upperArm);

// Forearm
const forearm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.04, 0.04, 0.30, 16),
  new THREE.MeshStandardMaterial({ color: 0x00ccff })
);
forearm.position.set(0, 1.35, -1);
forearm.rotation.z = Math.PI / 4;
limbGroup.add(forearm);

// Hand
const hand = new THREE.Mesh(
  new THREE.SphereGeometry(0.07, 16, 16),
  new THREE.MeshStandardMaterial({ color: 0xffcc00 })
);
hand.position.set(0, 1.2, -1);
limbGroup.add(hand);

scene.add(limbGroup);

// -----------------------------------------------------
// LOAD REAL GLB MODEL (optional, replaces placeholder)
// -----------------------------------------------------
const loader = new GLTFLoader();
let intactLimb, phantomLimb;

loader.load('./models/right_arm.glb', (gltf) => {
  intactLimb = gltf.scene;
  intactLimb.scale.set(0.2, 0.2, 0.2);
  intactLimb.position.set(0.25, 1.2, -0.5);
  scene.add(intactLimb);

  phantomLimb = intactLimb.clone();
  scene.add(phantomLimb);
});

// -----------------------------------------------------
// MIRROR FUNCTION
// -----------------------------------------------------
function mirrorLimb() {
  if (!intactLimb || !phantomLimb) return;

  phantomLimb.position.set(
    -intactLimb.position.x,
     intactLimb.position.y,
     intactLimb.position.z
  );

  phantomLimb.rotation.set(
    intactLimb.rotation.x,
    -intactLimb.rotation.y,
     intactLimb.rotation.z
  );
}

// -----------------------------------------------------
// CONTROLLER TRACKING
// -----------------------------------------------------
const controller = renderer.xr.getController(0);
scene.add(controller);

renderer.setAnimationLoop(() => {
  // Move placeholder limb with controller
  limbGroup.position.copy(controller.position);
  limbGroup.quaternion.copy(controller.quaternion);

  // Move real GLB limb if loaded
  if (intactLimb) {
    intactLimb.position.copy(controller.position);
    intactLimb.quaternion.copy(controller.quaternion);
  }

  mirrorLimb();
  renderer.render(scene, camera);
});

// -----------------------------------------------------
// RESIZE HANDLER
// -----------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
