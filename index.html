<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebXR Test – Realistic Arm (No Rotation)</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 1.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.xr.enabled = true;
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
scene.add(light);

// -----------------------------------------------------
// REALISTIC PROCEDURAL ARM (no GLB, no rotation)
// -----------------------------------------------------
const arm = new THREE.Group();

// Skin material
const skin = new THREE.MeshStandardMaterial({
  color: 0xffd2b8,
  roughness: 0.6,
  metalness: 0.1
});

// Shoulder
const shoulder = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 32, 32),
  skin
);
shoulder.position.set(0, 1.7, -1);
arm.add(shoulder);

// Upper arm
const upperArm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.09, 0.11, 0.35, 32),
  skin
);
upperArm.position.set(0, 1.5, -1);
upperArm.rotation.z = Math.PI / 12;
arm.add(upperArm);

// Elbow
const elbow = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 32, 32),
  skin
);
elbow.position.set(0, 1.33, -1);
arm.add(elbow);

// Forearm
const forearm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 0.08, 0.32, 32),
  skin
);
forearm.position.set(0, 1.15, -1);
forearm.rotation.z = Math.PI / 8;
arm.add(forearm);

// Wrist
const wrist = new THREE.Mesh(
  new THREE.SphereGeometry(0.06, 32, 32),
  skin
);
wrist.position.set(0, 1.0, -1);
arm.add(wrist);

// Hand
const hand = new THREE.Mesh(
  new THREE.BoxGeometry(0.12, 0.18, 0.05),
  skin
);
hand.position.set(0, 0.88, -1);
hand.rotation.x = Math.PI / 12;
arm.add(hand);

scene.add(arm);

// -----------------------------------------------------
// ANIMATION LOOP (no rotation)
// -----------------------------------------------------
renderer.setAnimationLoop(() => {
  renderer.render(scene, camera);
});

</script>

</body>
</html>
